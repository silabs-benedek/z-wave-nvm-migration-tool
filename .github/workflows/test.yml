---

name: test

# yamllint disable-line rule:line-length
run-name: "test: ${{ github.event.workflow_run.head_branch }}#${{ github.event.workflow_run.head_commit.id }}"

on:  # yamllint disable-line rule:truthy
  workflow_run:
    workflows: ["build"]
    types:
      - completed

jobs:
  test:
    permissions:
      contents: read
      statuses: write
    env:
      project-name: z-wave-protocol-controller  # Align to docker (lowercase)
    runs-on: ${{ vars.RUNNER || 'ubuntu-24.04' }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - id: download
        name: Download
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ github.event.repository.name }}-package
          github-token: ${{ secrets.GH_SL_ACCESS_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}

      - id: install
        name: Install
        env:
          file: ${{ steps.download.outputs.download-path }}/*.deb
        run: |
          set -x
          sudo dpkg -i ${{ env.file }} \
          || sudo apt install -f -y --no-install-recommends ${{ env.file }}
          dpkg -L ${{ github.event.repository.name }}

      - id: run
        name: Run
        run: |
          set -x
          ldd $(which ${{ github.event.repository.name }})          
          ${{ github.event.repository.name }} -h

      - name: Propagate status on fail
        # yamllint disable-line rule:line-length
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        if: failure()
        env:
          status: ${{ steps.run.outcome }}
          ref: ${{ github.event.workflow_run.head_commit.id }}
        with:
          script: |
            const status = await github.rest.repos.getCombinedStatusForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: process.env.ref,
            });
            core.info(`Combined status: ${status.data.state}`);
            await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: process.env.sha,
            state: 'failure'
            })
            core.setFailed(`Status: ${process.env.status}`);
